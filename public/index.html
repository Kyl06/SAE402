<!doctype html>
<!--
    @file index.html
    @description Point d'entrée principal du jeu. Contient le menu de sélection et le canvas.
-->
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bravery Quest</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --gold:      #f5c542;
            --gold-dark: #c9922a;
            --red:       #e03c2a;
            --orange:    #f07d10;
            --green:     #4ade80;
            --blue:      #60a5fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0f;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }

        /* ── CANVAS JEU ── */
        canvas {
            background: #222;
            border: 4px solid #444;
            image-rendering: pixelated;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            display: none;
            position: relative;
            z-index: 5;
        }

        /* ══════════════════════════════════════════
           MENU PRINCIPAL
        ══════════════════════════════════════════ */
        #start-menu {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 3000;
            overflow: hidden;
        }

        /* ── FOND : IMAGE GAMEPLAY FLOUTÉE ── */
        #bg-layer {
            position: absolute;
            inset: 0;
            background: url('assets/fondBQ.png') center/cover no-repeat;
            filter: brightness(0.65);
            transform: none;
            z-index: 0;
        }        

        /* ── CONTENU CENTRÉ ── */
        .menu-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── LOGO ── */
        .logo-wrapper {
            position: relative;
            margin-bottom: 56px;
            animation: logo-entrance 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes logo-entrance {
            from { opacity: 0; transform: translateY(-28px) scale(0.93); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-wrapper img {
            width: min(500px, 76vw);
            image-rendering: pixelated;
            display: block;
            animation: logo-pulse 3.5s ease-in-out infinite alternate;
        }

        @keyframes logo-pulse {
            from {
                filter: drop-shadow(0 0 16px rgba(224,60,42,0.65))
                        drop-shadow(0 0 40px rgba(240,125,16,0.3))
                        drop-shadow(0 5px 14px rgba(0,0,0,0.9));
                transform: scale(1);
            }
            to {
                filter: drop-shadow(0 0 28px rgba(245,197,66,0.9))
                        drop-shadow(0 0 60px rgba(240,125,16,0.55))
                        drop-shadow(0 5px 14px rgba(0,0,0,0.9));
                transform: scale(1.025);
            }
        }

        /* ── BOUTONS SOLO / DUO ── */
        .player-cards {
            display: flex;
            gap: 70px;
            animation: fade-up 0.7s 0.3s ease both;
            opacity: 0;
        }

        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
            padding: 4px 8px 0;
            user-select: none;
        }

        /* Texte SOLO / DUO — style identique à la maquette */
        .card-label {
            font-size: clamp(28px, 4vw, 40px);
            letter-spacing: 5px;
            font-family: 'Press Start 2P', monospace;
            color: var(--red);
            text-shadow:
                3px  3px 0 #000,
               -1px -1px 0 #000,
                1px -1px 0 #000,
               -1px  1px 0 #000,
                0    0  18px rgba(224,60,42,0.35);
            transition: color 0.18s ease, text-shadow 0.18s ease, transform 0.18s ease;
            display: block;
        }

        /* Soulignement rouge pixel */
        .card-underline {
            margin-top: 10px;
            height: 5px;
            width: calc(100% - 8px);
            background: var(--red);
            box-shadow: 0 3px 0 #7a1810, 0 0 10px rgba(224,60,42,0.45);
            transition: background 0.18s ease, box-shadow 0.18s ease;
        }

        /* Badge rôle discret */
        .role-badge {
            font-size: 6px;
            color: rgba(200,185,145,0.45);
            letter-spacing: 2px;
            margin-top: 9px;
        }

        /* Hover */
        .player-card:hover .card-label {
            color: var(--gold);
            text-shadow:
                3px  3px 0 #000,
               -1px -1px 0 #000,
                1px -1px 0 #000,
               -1px  1px 0 #000,
                0    0  28px rgba(245,197,66,0.75),
                0    0  55px rgba(240,125,16,0.4);
            transform: translateY(-5px);
        }
        .player-card:hover .card-underline {
            background: var(--gold);
            box-shadow: 0 3px 0 #7a5c00, 0 0 18px rgba(245,197,66,0.6);
        }

        /* ── STATUS ── */
        #status-text {
            font-size: 7px;
            color: rgba(210,195,155,0.5);
            margin-top: 38px;
            letter-spacing: 2px;
            animation: blink 1.5s ease-in-out infinite, fade-up 0.7s 0.55s ease both;
            opacity: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.6; }
            50%       { opacity: 0.18; }
        }

        /* ── NOUVELLE PARTIE ── */
        #new-game-btn {
            background: none;
            border: 1px solid rgba(150,80,80,0.3);
            color: rgba(180,100,100,0.55);
            padding: 8px 18px;
            font-family: 'Press Start 2P', monospace;
            font-size: 6px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 22px;
        }
        #new-game-btn:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(224,60,42,0.08);
        }

        /* ── COPYRIGHT ── */
        .copyright {
            position: absolute;
            bottom: 18px;
            left: 0; right: 0;
            text-align: center;
            font-size: 6px;
            color: rgba(185,170,130,0.4);
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
        }

        /* ══════════════════════════════════════════
           GAME OVER
        ══════════════════════════════════════════ */
        #game-over-ui {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5,5,10,0.96);
            color: white;
            padding: 48px;
            border: 3px solid var(--red);
            text-align: center;
            z-index: 2000;
            font-family: 'Press Start 2P', monospace;
        }

        .respawn-btn {
            background: none;
            color: #fff;
            border: 2px solid #fff;
            padding: 12px 28px;
            font-weight: bold;
            cursor: pointer;
            font-size: 10px;
            font-family: 'Press Start 2P', monospace;
            transition: all 0.2s;
            margin-top: 16px;
        }
        .respawn-btn:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- ── MENU PRINCIPAL ── -->
    <div id="start-menu">

        <!-- Fond gameplay flou -->
        <div id="bg-layer"></div>

        <!-- Contenu principal -->
        <div class="menu-content">

            <!-- Logo -->
            <div class="logo-wrapper">
                <img src="assets/logoBraveryQuest2.png" alt="Bravery Quest" draggable="false">
            </div>

            <!-- Boutons SOLO / DUO -->
            <div class="player-cards">
                <div class="player-card" id="player1-card" onclick="selectPlayer(1)">
                    <span class="card-label">SOLO</span>
                    <div class="card-underline"></div>
                    <div class="role-badge">HÔTE</div>
                </div>
                <div class="player-card" id="player2-card" onclick="selectPlayer(2)">
                    <span class="card-label">DUO</span>
                    <div class="card-underline"></div>
                    <div class="role-badge">INVITÉ</div>
                </div>
            </div>

            <!-- Message statut -->
            <div id="status-text">▶ CHOISISSEZ VOTRE MODE ◀</div>

            <!-- Nouvelle partie -->
            <button id="new-game-btn" onclick="newGame()">NOUVELLE PARTIE</button>

        </div>

        <!-- Copyright -->
        <div class="copyright">SAE 402 - BUT MMI &nbsp;©&nbsp; 2026 &nbsp;Tous droits réservés</div>

    </div>

    <!-- ── GAME OVER ── -->
    <div id="game-over-ui">
        <h2 style="font-size: 20px; margin-bottom: 24px; color: #e74c3c;">DEFAITE</h2>
        <p style="font-size: 8px; margin-bottom: 28px; color: #887777; line-height: 2;">Votre aventure s'arrête ici...</p>
        <button class="respawn-btn" onclick="location.reload()">RÉAPPARAÎTRE</button>
    </div>

    <!-- ── CANVAS JEU ── -->
    <canvas id="gameCanvas" width="800" height="660"></canvas>

    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
        /* ── LOGIQUE MENU (identique à l'original) ── */
        window.selectedPlayerRole = null;
        const menuSocket = io();

        menuSocket.on('roles_update', ({ player1Taken, player2Taken }) => {
            setCardState('player1-card', player1Taken);
            setCardState('player2-card', player2Taken);
        });

        menuSocket.on('role_confirmed', ({ role, skin, isHost }) => {
            window.selectedPlayerRole = isHost ? 1 : 2;
            window.menuSocket = menuSocket;
        });

        menuSocket.on('role_denied', () => {
            document.getElementById('status-text').textContent = '✕ Rôle déjà pris, choisissez l\'autre !';
            ['player1-card','player2-card'].forEach(id => {
                const c = document.getElementById(id);
                c.style.pointerEvents = '';
                c.style.opacity = '';
            });
        });

        function setCardState(cardId, taken) {
            const card = document.getElementById(cardId);
            if (!card) return;
            if (taken) {
                card.style.opacity = '0.3';
                card.style.pointerEvents = 'none';
                card.style.filter = 'grayscale(80%)';
                let badge = card.querySelector('.taken-badge');
                if (!badge) {
                    badge = document.createElement('div');
                    badge.className = 'taken-badge';
                    badge.textContent = 'PRIS';
                    badge.style.cssText = 'position:absolute;top:-20px;right:0;font-size:6px;color:#e74c3c;font-family:"Press Start 2P",monospace;';
                    card.appendChild(badge);
                }
            } else {
                card.style.opacity = '';
                card.style.pointerEvents = '';
                card.style.filter = '';
                const badge = card.querySelector('.taken-badge');
                if (badge) badge.remove();
            }
        }

        function newGame() {
            fetch('/api/save', { method: 'DELETE' }).then(() => {
                const btn = document.getElementById('new-game-btn');
                btn.textContent = 'SAUVEGARDE SUPPRIMÉE !';
                btn.style.borderColor = '#4ade80';
                btn.style.color = '#4ade80';
                setTimeout(() => {
                    btn.textContent = 'NOUVELLE PARTIE';
                    btn.style.borderColor = 'rgba(150,80,80,0.3)';
                    btn.style.color = 'rgba(180,100,100,0.55)';
                }, 1500);
            });
        }

        function selectPlayer(num) {
            const role = num === 1 ? 'player1' : 'player2';
            menuSocket.emit('select_role', role);
            const card = document.getElementById(`player${num}-card`);
            card.style.opacity = '0.5';
            card.style.pointerEvents = 'none';
            document.getElementById('status-text').textContent = '⏳ Connexion au serveur...';
            document.getElementById('start-menu').style.transition = 'opacity 0.5s';
        }

        window.hideMenu = function() {
            const menu = document.getElementById('start-menu');
            menu.style.opacity = '0';
            setTimeout(() => {
                menu.style.display = 'none';
                document.getElementById('gameCanvas').style.display = 'block';
            }, 500);
        };
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
