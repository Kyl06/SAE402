<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Map Editor v2 - RPG La Relique Volee</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* === SIDEBAR GAUCHE : Palette === */
        .sidebar-left {
            width: 260px;
            background: #16213e;
            border-right: 2px solid #0f3460;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-left h2 {
            padding: 12px;
            text-align: center;
            background: #0f3460;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            padding: 6px;
            background: #1a1a2e;
        }

        .cat-tab {
            flex: 1;
            min-width: 60px;
            padding: 5px 4px;
            font-size: 10px;
            text-align: center;
            background: #16213e;
            border: 1px solid #0f3460;
            color: #aaa;
            cursor: pointer;
            border-radius: 3px;
        }

        .cat-tab.active {
            background: #e94560;
            color: white;
            border-color: #e94560;
        }

        .tile-palette {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            align-content: start;
        }

        .tile-btn {
            border: 2px solid #333;
            background: #111;
            cursor: pointer;
            padding: 4px;
            text-align: center;
            border-radius: 4px;
            transition: border-color 0.15s;
        }

        .tile-btn:hover { border-color: #e94560; }
        .tile-btn.active { border-color: #e94560; background: #2a1a2e; }

        .tile-btn canvas {
            display: block;
            margin: 0 auto 3px;
            image-rendering: pixelated;
        }

        .tile-btn span {
            font-size: 9px;
            color: #aaa;
            display: block;
        }

        /* === ZONE CENTRALE : Canvas === */
        .editor-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #16213e;
            border-bottom: 2px solid #0f3460;
            flex-wrap: wrap;
        }

        .toolbar label {
            font-size: 12px;
            color: #aaa;
        }

        .toolbar select, .toolbar input, .toolbar button {
            padding: 5px 10px;
            background: #1a1a2e;
            color: white;
            border: 1px solid #0f3460;
            border-radius: 3px;
            font-size: 12px;
        }

        .toolbar button {
            cursor: pointer;
            background: #0f3460;
            transition: background 0.15s;
        }

        .toolbar button:hover { background: #e94560; }

        .toolbar .sep {
            width: 1px;
            height: 24px;
            background: #333;
        }

        .canvas-wrap {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        #editorCanvas {
            image-rendering: pixelated;
            cursor: crosshair;
            border: 2px solid #0f3460;
        }

        /* === SIDEBAR DROITE : Export / Infos === */
        .sidebar-right {
            width: 300px;
            background: #16213e;
            border-left: 2px solid #0f3460;
            display: flex;
            flex-direction: column;
        }

        .sidebar-right h3 {
            padding: 10px;
            background: #0f3460;
            font-size: 13px;
            text-align: center;
        }

        .info-panel {
            padding: 10px;
            font-size: 12px;
            border-bottom: 1px solid #333;
        }

        .info-panel span { color: #e94560; font-weight: bold; }

        .export-btns {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .export-btns button {
            padding: 8px;
            cursor: pointer;
            background: #0f3460;
            color: white;
            border: 1px solid #0f3460;
            border-radius: 3px;
            font-size: 12px;
        }

        .export-btns button:hover { background: #e94560; }

        .export-btns textarea {
            width: 100%;
            height: 200px;
            background: #0a0a1a;
            color: #0f0;
            font-family: 'Consolas', monospace;
            font-size: 10px;
            border: 1px solid #333;
            border-radius: 3px;
            resize: vertical;
            padding: 6px;
        }

        .layers-panel {
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .layers-panel label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .help-panel {
            padding: 10px;
            font-size: 11px;
            color: #888;
            flex: 1;
            overflow-y: auto;
        }

        .help-panel kbd {
            background: #333;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 10px;
        }
    </style>
</head>

            <label><input type="checkbox" id="showGrid" checked> Grille</label>

            <div class="sep"></div>
            <button id="btnUndo">Annuler</button>
            <button id="btnClear">Tout effacer</button>
        </div>
        <div class="canvas-wrap">
            <canvas id="editorCanvas" width="800" height="576"></canvas>
        </div>
    </div>

    <div class="sidebar-right">

        <div class="layers-panel">

            <label><input type="checkbox" class="layerToggle" value="ground" checked> Sol (herbe, sable)</label>
            <label><input type="checkbox" class="layerToggle" value="walls" checked> Murs / Bordures</label>
            <label><input type="checkbox" class="layerToggle" value="objects" checked> Objets (arbres, etc.)</label>

        </div>
        <div class="export-btns">
            <button id="btnExportJSON">Exporter en JSON</button>
            <button id="btnExportJS">Exporter en JS (zone file)</button>

            <textarea id="outputArea" placeholder="Le code exporte apparaitra ici..."></textarea>
        </div>
        <div class="help-panel">

            <kbd>Clic gauche</kbd> Placer tuile<br>
            <kbd>Clic droit</kbd> Supprimer tuile<br>
            <kbd>Ctrl+Z</kbd> Annuler<br>
            <kbd>G</kbd> Grille on/off<br>
            <kbd>E</kbd> Gomme<br>
            <kbd>B</kbd> Crayon<br>
            <kbd>F</kbd> Remplir<br>

        const CATEGORIES = {
            sol:        'Sol',

            special:    'Special',

            'GRASS': 'ground', 'SAND': 'ground', 'ORANGE_PATH': 'ground', 'FLOWERS': 'ground',

            'WATER': 'water', 'WATER_WAVES': 'water', 'WATERFALL': 'water', 'STREAM': 'water',

            'FENCE_1': 'walls', 'FENCE_2': 'walls', 'FENCE_3': 'walls',

        // =============================================
        // Spritesheet principal (map.png) + sheets supplementaires
        const spritesheets = {};

            'map':        'assets/map.png',
            'forteresse': 'assets/forteresse.png',
            'cimetiere': 'assets/cimetiere.png',
            'marais':    'assets/marais.png',
            'desert':    'assets/desert.png',

        let sheetsLoaded = 0;
        const totalSheets = Object.keys(sheetFiles).length;

        Object.entries(sheetFiles).forEach(([name, src]) => {
            const img = new Image();
            img.src = src;
            img.onload = () => {
                sheetsLoaded++;
                if (sheetsLoaded >= totalSheets) { buildPalette(); draw(); }
            };
            spritesheets[name] = img;
        });

        // Alias pour compatibilite
        const tileset = spritesheets['map'];

        const standaloneImages = {};
        const standaloneEntries = Object.entries(TILE_DEFS).filter(([, d]) => d.standalone);

            const img = new Image();
            img.src = def.standalone;
            standaloneImages[type] = img;
        });

        // =============================================
        //  PALETTE UI
        // =============================================
        let activeCategory = 'sol';

        function buildCategoryTabs() {
            const container = document.getElementById('catTabs');
            container.innerHTML = '';
            Object.entries(CATEGORIES).forEach(([key, label]) => {
                const btn = document.createElement('div');
                btn.className = 'cat-tab' + (key === activeCategory ? ' active' : '');
                btn.textContent = label;
                btn.onclick = () => {
                    activeCategory = key;
                    buildCategoryTabs();
                    buildPalette();
                };
                container.appendChild(btn);
            });
        }

        function buildPalette() {
            const container = document.getElementById('palette');
            container.innerHTML = '';
            Object.entries(TILE_DEFS)
                .filter(([, def]) => def.cat === activeCategory)
                .forEach(([type, def]) => {
                    const btn = document.createElement('div');
                    btn.className = 'tile-btn' + (type === selectedType ? ' active' : '');

                    // Mini preview canvas
                    const preview = document.createElement('canvas');
                    const pSize = 40;
                    preview.width = pSize;
                    preview.height = pSize;
                    preview.style.width = pSize + 'px';
                    preview.style.height = pSize + 'px';
                    const pCtx = preview.getContext('2d');
                    pCtx.imageSmoothingEnabled = false;

                    if (def.standalone) {
                        const img = standaloneImages[type];
                        if (img && img.complete) {
                            pCtx.drawImage(img, 0, 0, img.width, img.height, 0, 0, pSize, pSize);
                        } else if (img) {
                            img.onload = () => pCtx.drawImage(img, 0, 0, img.width, img.height, 0, 0, pSize, pSize);
                        }
                    } else {
                        const sheet = def.sheet ? spritesheets[def.sheet] : tileset;
                        if (sheet && sheet.complete) {
                            pCtx.drawImage(sheet, def.sx, def.sy, def.sw, def.sh, 0, 0, pSize, pSize);
                        }
                    }

                    const span = document.createElement('span');
                    span.textContent = def.label;

                    btn.appendChild(preview);
                    btn.appendChild(span);
                    btn.onclick = () => {
                        selectedType = type;
                        currentTool = 'pen';
                        updateToolButtons();
                        buildPalette();
                    };
                    container.appendChild(btn);
                });
        }

        buildCategoryTabs();

        // =============================================

        // =============================================
        function updateToolButtons() {
            document.getElementById('btnPen').style.background = currentTool === 'pen' ? '#e94560' : '';
            document.getElementById('btnFill').style.background = currentTool === 'fill' ? '#e94560' : '';
            document.getElementById('btnErase').style.background = currentTool === 'erase' ? '#e94560' : '';

        document.getElementById('btnPen').onclick   = () => { currentTool = 'pen';   updateToolButtons(); };

        document.getElementById('btnClear').onclick  = () => { saveUndo(); tiles = []; draw(); };

        // =============================================
        //  DRAWING
        // =============================================
        function draw() {
            ctx.fillStyle = '#1a3a1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw tiles
            tiles.forEach(t => {
                const def = TILE_DEFS[t.type];
                if (!def) return;

                // Layer visibility
                const layer = LAYER_MAP[t.type] || 'objects';
                if (!visibleLayers[layer]) return;

                if (def.standalone) {
                    const img = standaloneImages[t.type];
                    if (img && img.complete) {
                        const w = def.size || T;
                        const h = def.h || def.size || T;
                        ctx.drawImage(img, 0, 0, img.width, img.height, t.x, t.y, w, h);
                    }
                } else {
                    const sheet = def.sheet ? spritesheets[def.sheet] : tileset;
                    if (sheet && sheet.complete) {
                        const displaySize = def.size || T;
                        ctx.drawImage(sheet, def.sx, def.sy, def.sw, def.sh, t.x, t.y, displaySize, displaySize);
                    }
                }
            });

            // Grid
            if (document.getElementById('showGrid').checked) {
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 1;
                for (let x = 0; x <= canvas.width; x += T) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
                }
                for (let y = 0; y <= canvas.height; y += T) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                }
            }

            // Coordinates overlay
            if (document.getElementById('showCoords').checked) {
                ctx.font = '8px monospace';
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        ctx.fillText(`${c},${r}`, c * T + 2, r * T + 10);
                    }
                }
            }

            // Update info
            document.getElementById('infoTile').textContent = selectedType;
            document.getElementById('infoCount').textContent = tiles.length;
        }

        // =============================================
        //  TILE PLACEMENT
        // =============================================
        let isDrawing = false;

        function getGridPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = Math.floor((e.clientX - rect.left) * scaleX / T) * T;
            const y = Math.floor((e.clientY - rect.top) * scaleY / T) * T;
            return { x, y };
        }

        function placeTile(e) {
            const { x, y } = getGridPos(e);
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return;

            document.getElementById('infoPos').textContent = `${x}, ${y} (col ${x/T}, row ${y/T})`;

            if (currentTool === 'erase' || e.buttons === 2) {
                tiles = tiles.filter(t => !(t.x === x && t.y === y));
            } else if (currentTool === 'pen') {
                tiles = tiles.filter(t => !(t.x === x && t.y === y));
                tiles.push({ x, y, type: selectedType });
            } else if (currentTool === 'fill') {
                fillArea(x, y);
                isDrawing = false; // fill only once per click
            }
            draw();
        }

        function fillArea(startX, startY) {
            saveUndo();
            const targetType = getTileAt(startX, startY);
            if (targetType === selectedType) return;

            const queue = [{ x: startX, y: startY }];
            const visited = new Set();

            while (queue.length > 0) {
                const { x, y } = queue.shift();
                const key = `${x},${y}`;
                if (visited.has(key)) continue;
                if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;

                const current = getTileAt(x, y);
                if (current !== targetType) continue;

                visited.add(key);
                tiles = tiles.filter(t => !(t.x === x && t.y === y));
                tiles.push({ x, y, type: selectedType });

                queue.push({ x: x + T, y }, { x: x - T, y }, { x, y: y + T }, { x, y: y - T });
            }
        }

        function getTileAt(x, y) {
            const tile = tiles.find(t => t.x === x && t.y === y);
            return tile ? tile.type : null;
        }

        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (currentTool !== 'fill') saveUndo();
            isDrawing = true;
            placeTile(e);
        });
        canvas.addEventListener('mousemove', (e) => {
            const { x, y } = getGridPos(e);
            document.getElementById('infoPos').textContent = `${x}, ${y} (col ${x/T}, row ${y/T})`;
            if (isDrawing) placeTile(e);
        });
        window.addEventListener('mouseup', () => { isDrawing = false; });
        canvas.oncontextmenu = (e) => e.preventDefault();

        // =============================================
        //  UNDO
        // =============================================
        function saveUndo() {
            undoStack.push(JSON.stringify(tiles));
            if (undoStack.length > 50) undoStack.shift();
        }

        function undo() {
            if (undoStack.length === 0) return;
            tiles = JSON.parse(undoStack.pop());
            draw();
        }

        //  LAYER TOGGLES
        // =============================================
        document.querySelectorAll('.layerToggle').forEach(cb => {
            cb.addEventListener('change', () => {

                draw();
            });
        });

        document.getElementById('showGrid').addEventListener('change', draw);
        document.getElementById('showCoords').addEventListener('change', draw);

        // =============================================
        //  KEYBOARD SHORTCUTS
        // =============================================
        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
            if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
            if (e.key === 'g') document.getElementById('showGrid').click();
            if (e.key === 'e') { currentTool = 'erase'; updateToolButtons(); }
            if (e.key === 'b') { currentTool = 'pen';   updateToolButtons(); }
            if (e.key === 'f') { currentTool = 'fill';  updateToolButtons(); }
        });

        // =============================================
        document.getElementById('btnLoad').onclick = async () => {
            const zoneId = document.getElementById('zoneSelect').value;

            try {
                const mod = await import(`./world/maps/${zoneId}.js?v=${Date.now()}`);

                if (data && data.mapData && data.mapData.walls) {
                    tiles = data.mapData.walls.map(t => ({ x: t.x, y: t.y, type: t.type }));
                    draw();
                }
            } catch (err) {
                alert('Erreur de chargement : ' + err.message);
            }
        };

        // =============================================

            const grouped = {};

            let tilesStr = '';

                    tilesStr += `    { x: ${t.x}, y: ${t.y}, type: '${t.type}' },\n`;
                });
                tilesStr += '\n';
            }

            const js = `/**

 */
import { generateBorder, T, COLS, ROWS } from './mapUtils.js';

// Modifie les sorties selon tes besoins

const interior = [
${tilesStr}];

`;
            output.value = js;
        };

        document.getElementById('btnCopy').onclick = () => {
            const output = document.getElementById('outputArea');
            output.select();
            document.execCommand('copy');
            const btn = document.getElementById('btnCopy');
            const orig = btn.textContent;
            btn.textContent = 'Copie !';
            setTimeout(() => btn.textContent = orig, 1500);
        };

        document.getElementById('btnImportJSON').onclick = () => {
            const input = document.getElementById('outputArea').value.trim();
            if (!input) return;
            try {
                const data = JSON.parse(input);
                if (data.walls && Array.isArray(data.walls)) {
                    saveUndo();
                    tiles = data.walls.map(t => ({ x: t.x, y: t.y, type: t.type }));
                    draw();
                } else {
                    alert('Format invalide : le JSON doit contenir un champ "walls" (tableau).');
                }
            } catch (err) {
                alert('JSON invalide : ' + err.message);
            }
        };

        // =============================================
        //  INIT
        // =============================================
        updateToolButtons();
    </script>
</body>
