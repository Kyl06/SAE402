<!DOCTYPE html>
<html>

<head>
    <title>Zelda Map Editor - 16x16 Walls</title>
    <style>
        html {
            margin: 40px;
        }
        
        body {
            background: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            margin: 0;
        }

        canvas {
            background: #333;
            border: 2px solid #555;
            cursor: crosshair;
            image-rendering: pixelated;
        }

        .sidebar {
            padding: 20px;
            width: 320px;
            background: #1a1a1a;
            overflow-y: auto;
            height: 50vh;
            box-sizing: border-box;
        }

        .tile-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .tile-option {
            border: 2px solid #444;
            padding: 5px;
            cursor: pointer;
            text-align: center;
            font-size: 11px;
            background: #252525;
        }

        .tile-option.active {
            border-color: #0f0;
            background: #333;
        }

        .tile-preview {
            width: 32px;
            height: 32px;
            margin: 0 auto 5px;
            background-image: url('assets/map.png');
            background-size: 512px 256px; /* 256x128 scaled x2 */
            image-rendering: pixelated;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
        }

        button {
            padding: 10px;
            cursor: pointer;
            background: #444;
            color: white;
            border: 1px solid #666;
            width: 100%;
            margin-bottom: 10px;
        }

        .error-msg {
            color: #ff4444;
            font-size: 12px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>

<body>
    <canvas id="editorCanvas" width="800" height="608"></canvas>
    <div class="sidebar">
        <h2>Map Editor</h2>
        <div id="imageError" class="error-msg">⚠️ Image "assets/map.png" non trouvée !</div>
        <div class="tile-selector" id="selector"></div>
        <button onclick="copyJSON()">Copier le JSON</button>
        <textarea id="jsonOutput" readonly></textarea>
    </div>

    <script type="module">
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('jsonOutput');
        const errorDiv = document.getElementById('imageError');
        const GRID = 32;

        let walls = [];
        let isDrawing = false;

        const TILE_TYPES = {
            // Row 0
            'TREE':           { sx: 0,   sy: 0,  sw: 32, sh: 32, label: 'Arbre' },
            'GRASS':          { sx: 32,  sy: 0,  sw: 16, sh: 16, label: 'Herbe' },
            'WATER':          { sx: 48,  sy: 0,  sw: 16, sh: 16, label: 'Eau' },
            'WALL_DOWN':      { sx: 64,  sy: 0,  sw: 16, sh: 16, label: 'Mur BAS' },
            'WALL_UP':        { sx: 80,  sy: 0,  sw: 16, sh: 16, label: 'Mur HAUT' },
            'BRIDGE_H_RIGHT': { sx: 96,  sy: 0,  sw: 16, sh: 16, label: 'Pont H D' },
            'BRIDGE_H_LEFT':  { sx: 112, sy: 0,  sw: 16, sh: 16, label: 'Pont H G' },
            'ORANGE_BLOCK':   { sx: 128, sy: 0,  sw: 16, sh: 16, label: 'Bloc Orange' },
            'ORANGE_PATH':    { sx: 144, sy: 0,  sw: 16, sh: 16, label: 'Chemin Or.' },
            'YELLOW_BLOCK':   { sx: 160, sy: 0,  sw: 16, sh: 16, label: 'Bloc Jaune' },
            'DESERT_BUSH':    { sx: 176, sy: 0,  sw: 16, sh: 16, label: 'Pante Désert' },
            'WATER_WAVES':    { sx: 192, sy: 0,  sw: 16, sh: 16, label: 'Eau Vagues' },
            'FENCE_1':        { sx: 208, sy: 0,  sw: 16, sh: 16, label: 'Barrière 1' },
            'FENCE_2':        { sx: 224, sy: 0,  sw: 16, sh: 16, label: 'Barrière 2' },
            'FENCE_3':        { sx: 240, sy: 0,  sw: 16, sh: 16, label: 'Barrière 3' },

            // Row 1
            'SAND':           { sx: 32,  sy: 16, sw: 16, sh: 16, label: 'Sable' },
            'BUSH':           { sx: 48,  sy: 16, sw: 16, sh: 16, label: 'Herbe Haute' },
            'WALL_RIGHT':     { sx: 64,  sy: 16, sw: 16, sh: 16, label: 'Mur D' },
            'WALL_LEFT':      { sx: 80,  sy: 16, sw: 16, sh: 16, label: 'Mur G' },
            'CAVE_ENTRANCE':  { sx: 96,  sy: 16, sw: 16, sh: 16, label: 'Grotte' },
            'OWL':            { sx: 112, sy: 16, sw: 16, sh: 16, label: 'Hibou' },
            'STATUE':         { sx: 128, sy: 16, sw: 16, sh: 16, label: 'Statue' },
            'BARREL':         { sx: 144, sy: 16, sw: 16, sh: 16, label: 'Tonneau' },
            'BUSH_GREEN':     { sx: 160, sy: 16, sw: 16, sh: 16, label: 'Buisson V' },
            'TALL_GRASS':     { sx: 176, sy: 16, sw: 16, sh: 16, label: 'Herbe V' },
            'ROCK_GREY':      { sx: 192, sy: 16, sw: 16, sh: 16, label: 'Rocher G' },

            // Row 2
            'PALM':           { sx: 0,   sy: 32, sw: 32, sh: 32, label: 'Palmier' },
            'DUNGEON_WALL_1': { sx: 32,  sy: 32, sw: 16, sh: 16, label: 'Dungeon 1' },
            'DUNGEON_WALL_2': { sx: 48,  sy: 32, sw: 16, sh: 16, label: 'Dungeon 2' },
            'DUNGEON_WALL_3': { sx: 64,  sy: 32, sw: 16, sh: 16, label: 'Dungeon 3' },
            'DUNGEON_WALL_4': { sx: 80,  sy: 32, sw: 16, sh: 16, label: 'Dungeon 4' },
            'BIG_BUSH':       { sx: 96,  sy: 32, sw: 32, sh: 32, label: 'Gros Buisson' },
            'WATERFALL':      { sx: 128, sy: 32, sw: 16, sh: 16, label: 'Cascade' },
            'ROCK_WATER':     { sx: 144, sy: 32, sw: 16, sh: 16, label: 'Rocher Eau' },
            'FLOWERS':        { sx: 160, sy: 32, sw: 16, sh: 16, label: 'Fleurs' },
            'STREAM':         { sx: 176, sy: 32, sw: 16, sh: 16, label: 'Ruisseau' },
            'OWL_STATUE':     { sx: 192, sy: 32, sw: 16, sh: 16, label: 'Hibou Statue' },
            'CRYSTAL':        { sx: 208, sy: 32, sw: 16, sh: 16, label: 'Cristal' },

            // Row 3
            'CHEST':          { sx: 128, sy: 48, sw: 16, sh: 16, label: 'Coffre' },
            'STREAM_ALT':     { sx: 144, sy: 48, sw: 16, sh: 16, label: 'Ruiss. Alt' },
            'LEAVES':         { sx: 160, sy: 48, sw: 16, sh: 16, label: 'Feuilles' },
            'ROCK':           { sx: 176, sy: 48, sw: 16, sh: 16, label: 'Rocher' },
            'LANTERN':        { sx: 192, sy: 48, sw: 16, sh: 16, label: 'Lanterne' },
            'CAULDRON':       { sx: 208, sy: 48, sw: 16, sh: 16, label: 'Chaudron' },

            // Row 4
            'SHOP':           { sx: 0,   sy: 64, sw: 48, sh: 48, label: 'SHOP (48x48)' }
        };

        

        let selectedType = 'GRASS';
        const tileset = new Image();
        tileset.src = 'assets/map.png';

        tileset.onload = () => { errorDiv.style.display = 'none'; draw(); };
        tileset.onerror = () => { errorDiv.style.display = 'block'; };

        const selector = document.getElementById('selector');
        Object.keys(TILE_TYPES).forEach(type => {
            const config = TILE_TYPES[type];
            const div = document.createElement('div');
            div.className = `tile-option ${type === selectedType ? 'active' : ''}`;
            // On multiplie par 2 pour la preview pour que ce soit bien visible
            div.innerHTML = `<div class="tile-preview" style="background-position: -${config.sx * 2}px -${config.sy * 2}px"></div>${config.label}`;
            div.onclick = () => {
                document.querySelectorAll('.tile-option').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                selectedType = type;
            };
            selector.appendChild(div);
        });

        function placeTile(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / GRID) * GRID;
            const y = Math.floor((e.clientY - rect.top) / GRID) * GRID;

            if (e.buttons === 1) {
                if (!walls.some(w => w.x === x && w.y === y && w.type === selectedType)) {
                    walls = walls.filter(w => !(w.x === x && w.y === y));
                    walls.push({ x, y, type: selectedType });
                    draw();
                }
            } else if (e.buttons === 2) {
                walls = walls.filter(w => !(w.x === x && w.y === y));
                draw();
            }
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; placeTile(e); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) placeTile(e); });
        window.addEventListener('mouseup', () => { isDrawing = false; updateJSON(); });

        function draw() {
            ctx.fillStyle = "#333";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            for (let i = 0; i < canvas.width; i += GRID) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for (let i = 0; i < canvas.height; i += GRID) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

            walls.forEach(w => {
                const t = TILE_TYPES[w.type];
                if (tileset.complete) {
                    // Calcul de la taille d'affichage en fonction de la taille source
                    let displaySize = GRID;
                    if (['TREE', 'PALM', 'BIG_BUSH'].includes(w.type)) displaySize = GRID * 2;
                    if (w.type === 'SHOP') displaySize = GRID * 3;
                    
                    ctx.drawImage(tileset, t.sx, t.sy, t.sw, t.sh, w.x, w.y, displaySize, displaySize);
                }
            });
        }

        function updateJSON() { output.value = JSON.stringify({ walls }, null, 2); }
        canvas.oncontextmenu = (e) => e.preventDefault();
        window.copyJSON = () => { output.select(); document.execCommand('copy'); alert("JSON Copié !"); };
    </script>
</body>

</html>
